<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Else School — Corporate Outreach Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Open Sans',sans-serif;background:#fafaf7;color:#2C2C2A;min-height:100vh}
.wrap{max-width:960px;margin:0 auto;padding:20px 16px}
.hdr{margin-bottom:0;border-bottom:none;padding-bottom:12px;display:flex;align-items:center;gap:12px}
.logo{width:36px;height:36px;background:#21145F;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;font-family:'EB Garamond',Georgia,serif}
.hdr h1{margin:0;font-size:20px;font-weight:700;color:#21145F;font-family:'EB Garamond',Georgia,serif;letter-spacing:-0.3px}
.hdr small{font-size:11px;color:#75787B;letter-spacing:0.5px;display:block}
.nav{display:flex;gap:0;border-bottom:3px solid #21145F;margin-bottom:24px;flex-wrap:wrap}
.nav-tab{padding:10px 16px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;background:none;color:#75787B;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all 0.15s}
.nav-tab:hover{color:#21145F}
.nav-tab.active{color:#21145F;border-bottom-color:#21145F}
.nav-tab.disabled{color:#B4B2A9;cursor:default;opacity:0.6}
.nav-tab.disabled:hover{color:#B4B2A9}
.sub-nav{display:flex;gap:8px;margin-bottom:16px}
.sub-tab{padding:6px 14px;font-size:12px;font-weight:600;border-radius:20px;border:1px solid #d3d1c7;background:none;color:#5F5E5A;cursor:pointer;font-family:inherit;transition:all 0.15s}
.sub-tab.active{background:#21145F;color:#fff;border-color:#21145F}
.sub-tab:hover{border-color:#21145F}
.metrics{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.metric{background:#fff;border:1px solid #e8e6df;border-radius:10px;padding:16px 18px;flex:1 1 120px;min-width:120px}
.metric .lbl{font-size:11px;color:#888780;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.metric .val{font-size:28px;font-weight:700;color:#21145F;font-family:'EB Garamond',Georgia,serif}
.alert{background:#FAEEDA;border:1px solid #FAC775;border-radius:10px;padding:12px 16px;margin-bottom:20px}
.alert .ah{font-size:12px;font-weight:700;color:#633806;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px}
.alert-red{background:#FCEBEB;border:1px solid #F09595;border-radius:10px;padding:12px 16px;margin-bottom:20px}
.alert-red .ah{font-size:12px;font-weight:700;color:#791F1F;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px}
.orow{display:grid;grid-template-columns:1.5fr 1.5fr 1fr 0.6fr;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(250,199,117,0.3);font-size:13px;align-items:center;cursor:pointer;transition:background 0.1s}
.orow:hover{background:rgba(250,199,117,0.15)}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;letter-spacing:0.3px}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:8px 10px;border:1px solid #d3d1c7;border-radius:6px;font-size:13px;font-family:inherit;background:#fafaf7}
.toolbar input[type=text]{flex:1 1 200px}
.btn{background:#21145F;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:hover{background:#2d1d7a}
.btn-s{background:none;border:1px solid #d3d1c7;color:#5F5E5A;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-danger{background:#A32D2D;color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-sm{padding:5px 10px;font-size:11px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:#fff;border:1px solid #e8e6df;border-radius:10px;padding:14px 16px;cursor:pointer;transition:all 0.15s}
.card:hover{box-shadow:0 2px 12px rgba(33,20,95,0.08);transform:translateY(-1px)}
.card .nm{font-weight:700;font-size:14px;color:#21145F}
.card .ti{font-size:12px;color:#75787B;margin:2px 0}
.card .org{font-size:12px;color:#5F5E5A;font-weight:600}
.card .meta{display:flex;gap:12px;margin-top:8px;font-size:11px;color:#888780;flex-wrap:wrap}
.dcard{background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:24px;margin-bottom:16px}
.dcard h2{margin:0;font-size:22px;color:#21145F;font-family:'EB Garamond',Georgia,serif}
.dcard .sub{color:#75787B;font-size:14px;margin-top:2px}
.dcard h3{margin:0;font-size:16px;color:#21145F;font-family:'EB Garamond',Georgia,serif}
.section-title{font-size:12px;font-weight:700;color:#21145F;text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 8px;padding-top:12px;border-top:1px solid #f5f4f0}
.section-title:first-child{margin-top:0;padding-top:0;border-top:none}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;font-size:13px}
.fields .f{padding:4px 0;border-bottom:1px solid #f5f4f0}
.fields .fl{color:#888780;margin-right:8px}
.fields .fv{color:#2C2C2A;font-weight:500}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg label{font-size:11px;color:#888780;display:block;margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:1px solid #d3d1c7;border-radius:6px;font-size:13px;font-family:inherit;background:#fafaf7;box-sizing:border-box}
.fg textarea{min-height:70px;resize:vertical}
.fg .cb-row{display:flex;align-items:center;gap:8px;padding:8px 0}
.fg .cb-row input[type=checkbox]{width:auto;margin:0}
.fg .cb-row label{margin:0;font-size:13px;color:#2C2C2A;cursor:pointer}
.fg .section-label{grid-column:1/-1;font-size:12px;font-weight:700;color:#21145F;text-transform:uppercase;letter-spacing:0.8px;margin:12px 0 0;padding-top:12px;border-top:1px solid #f5f4f0}
.irow{padding:12px 0;border-bottom:1px solid #f5f4f0}
.itype{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#21145F;background:#EEEDFE;padding:2px 8px;border-radius:4px;display:inline-block}
.idate{font-size:12px;color:#888780;margin-left:8px}
.iby{font-size:11px;color:#B4B2A9;margin-left:8px}
.isum{font-size:13px;color:#2C2C2A;line-height:1.5;margin-top:4px}
.back{background:none;border:none;color:#21145F;cursor:pointer;font-size:13px;font-weight:600;padding:0;margin-bottom:16px;font-family:inherit}
.footer{margin-top:32px;padding-top:12px;border-top:1px solid #e8e6df;font-size:10px;color:#B4B2A9;text-align:center}
.cnt{font-size:12px;color:#888780;margin-bottom:8px}
.iform{background:#fafaf7;border:1px solid #e8e6df;border-radius:8px;padding:16px;margin-bottom:16px;display:none}
.iform.show{display:block}
.efields{display:none}
.efields.show{display:block}
.vfields.hide{display:none}
.compliance-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:0.3px}
.compliance-tag.ferpa{background:#FCEBEB;color:#791F1F}
.compliance-tag.gdpr{background:#FAEEDA;color:#633806}
.compliance-tag.alum{background:#E1F5EE;color:#085041}
.compliance-tag.consent-yes{background:#EAF3DE;color:#27500A}
.compliance-tag.consent-no{background:#FCEBEB;color:#791F1F}
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.tbl th{text-align:left;font-size:11px;color:#888780;text-transform:uppercase;letter-spacing:0.5px;padding:8px 10px;border-bottom:2px solid #e8e6df}
.tbl td{padding:8px 10px;border-bottom:1px solid #f5f4f0;color:#2C2C2A}
.tbl tr:hover{background:#fafaf7}
.tbl tr.clickable{cursor:pointer}
.tbl tr.clickable:hover{background:#EEEDFE}
.member-pill{display:inline-block;font-size:11px;padding:3px 10px;border-radius:12px;background:#EEEDFE;color:#3C3489;margin:2px 4px 2px 0}
</style>
</head>
<body>
<div class="wrap" id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:300px;color:#75787B">Loading pipeline data...</div></div>
<script>
var SB_URL='https://akegekomjwggrvpphxog.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFrZWdla29tandnZ3J2cHBoeG9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTA3MjYsImV4cCI6MjA4OTAyNjcyNn0.yo3lXeRzQTLAZYfYY8QM0vuHYw5AzJwIdZjE2n8bpnw';

function apiCall(path,opts){
  opts=opts||{};
  var h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
  return fetch(SB_URL+'/rest/v1/'+path,Object.assign({headers:h},opts)).then(function(r){
    if(!r.ok) return r.text().then(function(t){throw new Error(t)});
    return r.text().then(function(t){return t?JSON.parse(t):[]});
  });
}

/* ── Constants ── */
var SC={
  'Prospective':{bg:'#EEEDFE',tx:'#3C3489',bd:'#AFA9EC'},
  'In-Development':{bg:'#E6F1FB',tx:'#0C447C',bd:'#85B7EB'},
  'Active Pipeline':{bg:'#E1F5EE',tx:'#085041',bd:'#5DCAA5'},
  'Closed Won':{bg:'#EAF3DE',tx:'#27500A',bd:'#97C459'},
  'Closed Lost':{bg:'#FCEBEB',tx:'#791F1F',bd:'#F09595'},
  'Low ROI':{bg:'#F1EFE8',tx:'#444441',bd:'#B4B2A9'},
  'Dormant':{bg:'#F1EFE8',tx:'#5F5E5A',bd:'#D3D1C7'},
  'Unassigned':{bg:'#FAEEDA',tx:'#633806',bd:'#FAC775'}
};
var STATUSES=Object.keys(SC);
var TYPES=['email','phone_call','in_person_meeting','event','presentation','site_visit','referral','note'];
var TEAM=['Fiser, Harvey','Pickering, Steve','McCaa, Meg','Freeman, Naomi','Dorman, Bonnie'];
var PHONE_TYPES=['Mobile','Office','Home','Other'];
var DATA_CLASSIFICATIONS=['internal','confidential','public'];
var PROGRAMS=['EMBA','Full-time MBA','Graduate Admissions','Executive Education','Corporate Training'];
var TASK_STATUSES=['not_started','in_progress','completed','on_hold','cancelled'];
var TASK_PRIORITIES=['High','Medium','Low'];
var CAMPAIGN_TYPES=['recruitment','newsletter','event_promotion','application_deadline','alumni_engagement','corporate_partnership','other'];
var MAILING_CHANNELS=['email','postal_mail','event_invitation','sms','other'];
var RESPONSE_TYPES=['opened','clicked','replied','attended','did_not_attend','interested','not_interested','other'];
var INTEREST_LEVELS=['High','Medium','Low','Exploring'];

var TASK_SC={
  'not_started':{bg:'#FAEEDA',tx:'#633806',bd:'#FAC775'},
  'in_progress':{bg:'#E6F1FB',tx:'#0C447C',bd:'#85B7EB'},
  'completed':{bg:'#EAF3DE',tx:'#27500A',bd:'#97C459'},
  'on_hold':{bg:'#F1EFE8',tx:'#5F5E5A',bd:'#D3D1C7'},
  'cancelled':{bg:'#FCEBEB',tx:'#791F1F',bd:'#F09595'}
};
var CAMP_SC={
  'upcoming':{bg:'#FAEEDA',tx:'#633806',bd:'#FAC775'},
  'active':{bg:'#E1F5EE',tx:'#085041',bd:'#5DCAA5'},
  'ended':{bg:'#F1EFE8',tx:'#5F5E5A',bd:'#D3D1C7'},
  'draft':{bg:'#EEEDFE',tx:'#3C3489',bd:'#AFA9EC'}
};

/* ── Data ── */
var contacts=[],interactions=[],tasks=[],campaigns=[];
var mailings=[],mailingLists=[],memberships=[],responses=[];
var programInterests=[],optOuts=[],auditLog=[],retentionPolicies=[];

/* ── State ── */
var activeTab='contacts',curView='list',selId=null;
var searchVal='',fStatus='all',fAssign='all';
var taskSearch='',fTaskStatus='all',fTaskAssign='all',selTaskId=null,taskView='list';
var campSearch='',fCampType='all',fCampProgram='all',selCampId=null,campView='list';
var mailSubTab='mailings',mailView='list',selMailId=null,selListId=null;

/* ── Helpers ── */
function makeBadge(s){var c=SC[s]||SC['Unassigned'];return '<span class="badge" style="background:'+c.bg+';color:'+c.tx+';border:1px solid '+c.bd+'">'+s+'</span>'}
function makeTaskBadge(s){var c=TASK_SC[s]||TASK_SC['not_started'];return '<span class="badge" style="background:'+c.bg+';color:'+c.tx+';border:1px solid '+c.bd+'">'+(s||'not_started').replace(/_/g,' ')+'</span>'}
function makeCampBadge(s){var c=CAMP_SC[s]||CAMP_SC['draft'];return '<span class="badge" style="background:'+c.bg+';color:'+c.tx+';border:1px solid '+c.bd+'">'+s+'</span>'}
function fmtDate(d){if(!d) return '\u2014';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
function shortDate(d){if(!d) return '';return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function daysOverdue(d){return Math.floor((Date.now()-new Date(d))/86400000)}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getCampaignStatus(c){var t=new Date();if(c.end_date&&new Date(c.end_date)<t) return 'ended';if(c.start_date&&new Date(c.start_date)<=t) return 'active';if(c.start_date&&new Date(c.start_date)>t) return 'upcoming';return 'draft'}
function getContactName(id){if(!id) return null;for(var i=0;i<contacts.length;i++){if(contacts[i].contact_id===id) return contacts[i].name}return null}
function getCampaignName(id){if(!id) return null;for(var i=0;i<campaigns.length;i++){if(campaigns[i].campaign_id===id) return campaigns[i].campaign_name}return null}
function getListName(id){if(!id) return null;for(var i=0;i<mailingLists.length;i++){if(mailingLists[i].mailing_list_id===id) return mailingLists[i].list_name}return null}

/* ── Load Data ── */
function loadData(){
  return Promise.all([
    apiCall('contacts?order=name.asc'),
    apiCall('interactions?order=interaction_date.desc.nullslast'),
    apiCall('tasks?order=due_date.asc.nullslast'),
    apiCall('campaigns?order=start_date.desc.nullslast'),
    apiCall('mailings?order=mailing_date.desc.nullslast'),
    apiCall('mailing_lists?order=list_name.asc'),
    apiCall('mailing_list_memberships?order=date_added.desc.nullslast'),
    apiCall('mailing_responses?order=response_date.desc.nullslast'),
    apiCall('program_interests?order=created_at.desc.nullslast'),
    apiCall('contact_opt_outs?order=opt_out_date.desc.nullslast'),
    apiCall('audit_log?order=timestamp.desc.nullslast&limit=200'),
    apiCall('data_retention_policy?order=contact_category.asc')
  ]).then(function(r){
    contacts=r[0];interactions=r[1];tasks=r[2];campaigns=r[3];
    mailings=r[4];mailingLists=r[5];memberships=r[6];responses=r[7];
    programInterests=r[8];optOuts=r[9];auditLog=r[10];retentionPolicies=r[11];
    render();
  });
}

/* ── Filters ── */
function getOverdue(){return contacts.filter(function(c){return c.follow_up_date&&new Date(c.follow_up_date)<new Date()&&['Closed Won','Closed Lost','Low ROI'].indexOf(c.pipeline_status)===-1}).sort(function(a,b){return new Date(a.follow_up_date)-new Date(b.follow_up_date)})}
function getFiltered(){return contacts.filter(function(c){if(searchVal){var hay=((c.name||'')+' '+(c.organization||'')+' '+(c.title||'')).toLowerCase();if(hay.indexOf(searchVal.toLowerCase())===-1) return false}if(fStatus!=='all'&&c.pipeline_status!==fStatus) return false;if(fAssign!=='all'&&(!c.assigned_to||c.assigned_to.indexOf(fAssign)===-1)) return false;return true})}
function getFilteredTasks(){return tasks.filter(function(t){if(taskSearch){var h=((t.task_title||'')+' '+(t.description||'')).toLowerCase();if(h.indexOf(taskSearch.toLowerCase())===-1) return false}if(fTaskStatus!=='all'&&t.status!==fTaskStatus) return false;if(fTaskAssign!=='all'&&(!t.assigned_to||t.assigned_to.indexOf(fTaskAssign)===-1)) return false;return true})}
function getFilteredCampaigns(){return campaigns.filter(function(c){if(campSearch){var h=((c.campaign_name||'')+' '+(c.description||'')).toLowerCase();if(h.indexOf(campSearch.toLowerCase())===-1) return false}if(fCampType!=='all'&&c.campaign_type!==fCampType) return false;if(fCampProgram!=='all'&&c.program!==fCampProgram) return false;return true})}

/* ── Navigation ── */
function renderNav(){
  var tabs=[{id:'contacts',label:'Contacts'},{id:'tasks',label:'Tasks'},{id:'campaigns',label:'Campaigns'},{id:'mailings',label:'Mailings'},{id:'compliance',label:'Compliance'},{id:'audit',label:'Audit Log'}];
  var h='<div class="nav">';
  tabs.forEach(function(t){h+='<button class="nav-tab'+(t.id===activeTab?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</button>'});
  h+='</div>';return h;
}
function switchTab(t){activeTab=t;curView='list';selId=null;searchVal='';fStatus='all';fAssign='all';taskView='list';campView='list';mailView='list';mailSubTab='mailings';render()}

/* ══════════════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════════════ */
function render(){
  var el=document.getElementById('app');
  var h='<div class="hdr"><div class="logo">E</div><div><h1>Else School &mdash; Corporate outreach</h1><small>PIPELINE TRACKER</small></div></div>';
  h+=renderNav();
  if(activeTab==='contacts'){if(curView==='detail') return renderDetail(el,h);h+=renderContactsList()}
  else if(activeTab==='tasks'){if(taskView==='detail'){h+=renderTaskDetail()}else{h+=renderTasksList()}}
  else if(activeTab==='campaigns'){if(campView==='detail'){h+=renderCampaignDetail()}else{h+=renderCampaignsList()}}
  else if(activeTab==='mailings'){h+=renderMailingsTab()}
  else if(activeTab==='compliance'){h+=renderComplianceTab()}
  else if(activeTab==='audit'){h+=renderAuditTab()}
  h+='<div class="footer">Else School of Management &mdash; Corporate Outreach Tracker &mdash; Millsaps College</div>';
  el.innerHTML=h;
}

/* ══════════════════════════════════════════════════════════════════
   CONTACTS TAB
   ══════════════════════════════════════════════════════════════════ */
function renderContactsList(){
  var od=getOverdue(),fl=getFiltered(),sc={};
  contacts.forEach(function(c){sc[c.pipeline_status]=(sc[c.pipeline_status]||0)+1});
  var h='<div class="metrics">';
  h+='<div class="metric"><div class="lbl">Total</div><div class="val">'+contacts.length+'</div></div>';
  h+='<div class="metric"><div class="lbl">Active pipeline</div><div class="val" style="color:#1D9E75">'+(sc['Active Pipeline']||0)+'</div></div>';
  h+='<div class="metric"><div class="lbl">In development</div><div class="val" style="color:#378ADD">'+(sc['In-Development']||0)+'</div></div>';
  h+='<div class="metric"><div class="lbl">Overdue</div><div class="val" style="color:'+(od.length?'#A32D2D':'#1D9E75')+'">'+od.length+'</div></div>';
  h+='</div>';
  if(od.length){h+='<div class="alert"><div class="ah">Overdue follow-ups ('+od.length+')</div>';od.slice(0,5).forEach(function(c){var d=daysOverdue(c.follow_up_date),dc=d>90?'#A32D2D':d>30?'#BA7517':'#5F5E5A';h+='<div class="orow" onclick="openContact('+c.contact_id+')"><div style="font-weight:600;color:#21145F">'+esc(c.name)+'</div><div style="color:#75787B">'+esc(c.organization||'')+'</div>'+makeBadge(c.pipeline_status)+'<div style="text-align:right;font-weight:700;color:'+dc+'">'+d+'d</div></div>'});h+='</div>'}
  h+='<div class="toolbar"><input type="text" placeholder="Search contacts..." value="'+esc(searchVal)+'" oninput="searchVal=this.value;render()">';
  h+='<select onchange="fStatus=this.value;render()"><option value="all">All statuses</option>';STATUSES.forEach(function(s){h+='<option value="'+s+'"'+(fStatus===s?' selected':'')+'>'+s+' ('+(sc[s]||0)+')</option>'});h+='</select>';
  h+='<select onchange="fAssign=this.value;render()"><option value="all">All team</option>';TEAM.forEach(function(t){h+='<option value="'+esc(t)+'"'+(fAssign===t?' selected':'')+'>'+t.split(',')[0]+'</option>'});h+='</select>';
  h+='<button class="btn" onclick="curView=\'add\';render()">+ Add contact</button></div>';
  if(curView==='add') h+=renderAddContactForm();
  h+='<div class="cnt">'+fl.length+' contact'+(fl.length!==1?'s':'')+'</div><div class="grid">';

  var lm=memberships.filter(function(m){return m.mailing_list_id===l.mailing_list_id});
  var h='<button class="back" onclick="mailView=\'list\';render()">&larr; Back to lists</button><div class="dcard">';
  h+='<h2>'+esc(l.list_name)+'</h2>';
  h+='<div class="fields" style="margin-top:12px">';
  h+='<div class="f"><span class="fl">Program:</span><span class="fv">'+esc(l.program||'\u2014')+'</span></div>';
  h+='<div class="f"><span class="fl">Type:</span><span class="fv">'+esc((l.campaign_type||'').replace(/_/g,' ')||'\u2014')+'</span></div>';
  h+='<div class="f"><span class="fl">Owner:</span><span class="fv">'+esc(l.owner||'\u2014')+'</span></div>';
  h+='<div class="f"><span class="fl">Members:</span><span class="fv">'+lm.length+'</span></div>';
  if(l.description) h+='<div class="f" style="grid-column:1/-1"><span class="fl">Description:</span><span class="fv">'+esc(l.description)+'</span></div>';
  h+='</div></div>';

  // Members
  h+='<div class="dcard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3>Members</h3><button class="btn btn-sm" onclick="document.getElementById(\'ml-add\').classList.toggle(\'show\')">+ Add member</button></div>';
  h+='<div id="ml-add" class="iform"><div class="fg" style="grid-template-columns:1fr 1fr">';
  h+='<div><label>Contact</label><select id="ml-contact"><option value="">Select contact...</option>';contacts.forEach(function(c){h+='<option value="'+c.contact_id+'">'+esc(c.name)+'</option>'});h+='</select></div>';
  h+='<div style="display:flex;align-items:flex-end"><button class="btn" onclick="addMember('+l.mailing_list_id+')">Add to list</button></div></div></div>';
  if(!lm.length){h+='<div style="text-align:center;padding:16px;color:#888780;font-size:13px">No members yet</div>'}
  else{h+='<table class="tbl"><thead><tr><th>Contact</th><th>Added</th><th>Status</th></tr></thead><tbody>';
  lm.forEach(function(m){var cn=getContactName(m.contact_id);h+='<tr><td><a href="#" onclick="openContact('+m.contact_id+');return false" style="color:#21145F;font-weight:600;text-decoration:none">'+esc(cn||'#'+m.contact_id)+'</a></td><td>'+fmtDate(m.date_added)+'</td><td>'+(m.opted_in?'<span style="color:#085041">Opted in</span>':'<span style="color:#791F1F">Opted out</span>')+'</td></tr>'});
  h+='</tbody></table>'}
  h+='</div>';
  return h;
}

/* ══════════════════════════════════════════════════════════════════
   COMPLIANCE TAB (Batch 6)

function renderComplianceTab(){
  var gdprReqs=contacts.filter(function(c){return c.gdpr_deletion_requested});
  var noConsent=contacts.filter(function(c){return c.consent_marketing===false});
  var h='<div class="metrics"><div class="metric"><div class="lbl">GDPR Requests</div><div class="val" style="color:'+(gdprReqs.length?'#A32D2D':'#1D9E75')+'">'+gdprReqs.length+'</div></div><div class="metric"><div class="lbl">No Consent</div><div class="val">'+noConsent.length+'</div></div><div class="metric"><div class="lbl">Opt-outs</div><div class="val">'+optOuts.length+'</div></div><div class="metric"><div class="lbl">Retention Policies</div><div class="val">'+retentionPolicies.length+'</div></div></div>';

  if(gdprReqs.length){
    h+='<div class="alert-red"><div class="ah">Pending GDPR Deletion Requests</div>';
    gdprReqs.forEach(function(c){h+='<div class="orow" style="grid-template-columns:1.5fr 1.5fr 1fr" onclick="openContact('+c.contact_id+')"><div style="font-weight:600;color:#21145F">'+esc(c.name)+'</div><div style="color:#75787B">'+esc(c.organization||'')+'</div><div style="color:#791F1F">Requested '+fmtDate(c.gdpr_deletion_requested_date)+'</div></div>'});
    h+='</div>';
  }

  // Opt-outs log
  h+='<div class="dcard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3>Opt-out log</h3><button class="btn btn-sm" onclick="document.getElementById(\'oo-form\').classList.toggle(\'show\')">+ Log opt-out</button></div>';
  h+='<div id="oo-form" class="iform"><div class="fg">';
  h+='<div><label>Contact *</label><select id="oo-contact"><option value="">Select...</option>';contacts.forEach(function(c){h+='<option value="'+c.contact_id+'">'+esc(c.name)+'</option>'});h+='</select></div>';
  h+='<div><label>Date</label><input type="date" id="oo-date" value="'+new Date().toISOString().slice(0,10)+'"></div>';
  h+='<div><label>Initiated by</label><select id="oo-by"><option value="">Select...</option>';TEAM.forEach(function(t){h+='<option value="'+esc(t)+'">'+esc(t)+'</option>'});h+='</select></div>';
  h+='<div><label>Reason</label><input id="oo-reason"></div>';
  h+='<div><label>Action taken</label><input id="oo-action"></div>';
  h+='<div><label>Action date</label><input type="date" id="oo-action-date"></div>';
  h+='<div style="grid-column:1/-1"><label>Notes</label><textarea id="oo-notes"></textarea></div>';
  h+='<div style="grid-column:1/-1;margin-top:4px"><button class="btn" onclick="saveOptOut()">Save opt-out</button></div></div></div>';
  if(!optOuts.length){h+='<div style="text-align:center;padding:16px;color:#888780;font-size:13px">No opt-outs recorded</div>'}
  else{h+='<table class="tbl"><thead><tr><th>Contact</th><th>Date</th><th>Reason</th><th>Action</th></tr></thead><tbody>';
  optOuts.forEach(function(o){var cn=getContactName(o.contact_id);h+='<tr><td><a href="#" onclick="openContact('+o.contact_id+');return false" style="color:#21145F;text-decoration:none;font-weight:600">'+esc(cn||'#'+o.contact_id)+'</a></td><td>'+fmtDate(o.opt_out_date)+'</td><td>'+esc(o.opt_out_reason||'\u2014')+'</td><td>'+esc(o.action_taken||'\u2014')+'</td></tr>'});
  h+='</tbody></table>'}
  h+='</div>';

  // Data retention policies
  h+='<div class="dcard"><h3>Data retention policies</h3>';
  if(!retentionPolicies.length){h+='<div style="text-align:center;padding:16px;color:#888780;font-size:13px">No policies defined</div>'}
  else{h+='<table class="tbl"><thead><tr><th>Category</th><th>Policy</th><th>Notes</th></tr></thead><tbody>';
  retentionPolicies.forEach(function(p){h+='<tr><td style="font-weight:600">'+esc(p.contact_category)+'</td><td>'+esc(p.policy_description||'')+'</td><td>'+esc(p.notes||'')+'</td></tr>'});
  h+='</tbody></table>'}
  h+='</div>';
  return h;
}

/* ══════════════════════════════════════════════════════════════════
   AUDIT LOG TAB (Batch 7)
   ══════════════════════════════════════════════════════════════════ */
function renderAuditTab(){
  var h='<div class="metrics"><div class="metric"><div class="lbl">Log entries</div><div class="val">'+auditLog.length+'</div></div></div>';
  if(!auditLog.length){h+='<div style="text-align:center;padding:40px;color:#888780">No audit log entries</div>'}
  else{h+='<div class="dcard"><h3>Recent activity (last 200)</h3><table class="tbl" style="margin-top:12px"><thead><tr><th>Time</th><th>Table</th><th>Action</th><th>Record</th><th>By</th></tr></thead><tbody>';
  auditLog.forEach(function(a){
    var ts=a.timestamp?new Date(a.timestamp).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
    h+='<tr><td style="white-space:nowrap">'+esc(ts)+'</td><td>'+esc(a.table_name||'')+'</td><td><span class="itype">'+esc(a.action||'')+'</span></td><td>#'+(a.record_id||'')+'</td><td>'+esc(a.accessed_by||'')+'</td></tr>'});
  h+='</tbody></table></div>'}
  return h;
}
